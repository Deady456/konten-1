niche: "fascinating educational facts (science, history, nature, space, human body)"
audience: "curious adults who love learning surprising facts"
language: en

script:
  model: llama-3.3-70b-versatile
  target_seconds: 55
  words_per_second: 2.5

voice:
  provider: edge
  voice: en-US-ChristopherNeural
  rate: "-12%"
  pitch: "+0Hz"

captions:
  whisper_model: base
  font: "Anton"
  font_size: 90
  primary_color: "&H00FFFFFF"
  outline_color: "&H00000000"
  outline: 6
  words_per_caption: 3
  position_y: 0.55

video:
  width: 1080
  height: 1920
  fps: 30

upload:
  privacy: "public"
  category_id: "27"
  made_for_kids: false
  default_tags: ["shorts", "facts", "didyouknow", "education", "learn"]

comments:
  model: llama-3.1-8b-instant
  poll_interval_minutes: 180
  auto_reply: true
  delete_spam: true
